<style>
/* ─── PARTNERS MARQUEE ─── */
.partners-marquee {
  background:var(--white);
  padding:64px 0;
  overflow:hidden;
  position:relative;
  border-top:1px solid var(--grey-light);
  border-bottom:1px solid var(--grey-light);
}
.partners-marquee-label {
  text-align:center;
  font-size:11px;
  font-weight:600;
  letter-spacing:0.28em;
  text-transform:uppercase;
  color:var(--grey-mid);
  margin-bottom:36px;
}
.marquee-wrapper {
  position:relative;
  width:100%;
  overflow:hidden;
}
.marquee-wrapper::before,
.marquee-wrapper::after {
  content:'';
  position:absolute;
  top:0;
  bottom:0;
  width:120px;
  z-index:2;
  pointer-events:none;
}
.marquee-wrapper::before {
  left:0;
  background:linear-gradient(to right, var(--white), transparent);
}
.marquee-wrapper::after {
  right:0;
  background:linear-gradient(to left, var(--white), transparent);
}
.marquee-track {
  display:flex;
  align-items:center;
  gap:0;
  animation:marquee-scroll 45s linear infinite;
  width:max-content;
}
.marquee-track img {
  width:auto;
  object-fit:contain;
  object-position:center center;
  filter:brightness(0);
  opacity:0.50;
  flex-shrink:0;
  padding:0 48px;
}
/* Individual sizing for visual balance */
.logo-sm  { height:34px; } /* pure wordmarks — wide */
.logo-md  { height:50px; } /* symbol + text — medium */
.logo-lg  { height:62px; } /* square symbols — need more height */
.logo-xl  { height:78px; } /* logos that need extra visibility */
/* T2B specific adjustment — logo is top-heavy */
img[alt="T2B"] { object-position:center 60%; }
/* AI Genetics size reduction */
img[alt="AI Genetics"] { height:20px !important; }
@keyframes marquee-scroll {
  0%   { transform:translateX(0); }
  100% { transform:translateX(-50%); }
}
</style>
